        }
        let levelText = (currentLang === 'zh') ? 
            (category === 'SZF' ? uiText.zh.levelTextSZF : uiText.zh.levelTextOther) : 
            (category === 'SZF' ? uiText.en.levelTextSZF : uiText.en.levelTextOther);
        
        return `
            <div class="entity-card">
                <div class="card-header">
                    <span class="law-name">${escapeHtml(item.name)}</span>
                    <span class="law-index">${escapeHtml(item.code)}</span>
                </div>
                <div class="law-content">${escapeHtml(item.content)}</div>
                ${extraHtml}
                <div style="display: flex; justify-content: flex-end; margin-top: 12px;">
                    <span class="danger-level">${escapeHtml(levelText)}</span>
                </div>
                <div class="law-footnote"> [TIME.GOV] Original Catalog · Wiki Sync Protocol</div>
            </div>
        `;
    }

    // 容器元素
    const containerShi = document.getElementById('shizhenfeng-laws');
    const containerDeng = document.getElementById('dengxueshuang');
    const containerOther = document.getElementById('other-laws');

    // 动态更新时间戳 (双语自适应)
    let timeSpanElement = null;
    function initTimestampElement() {
        if (!timeSpanElement) {
            const footerDiv = document.querySelector('footer');
            const existingTimeDiv = document.getElementById('dynamicTimestamp');
            if (existingTimeDiv) existingTimeDiv.remove();
            const timeDiv = document.createElement('div');
            timeDiv.id = 'dynamicTimestamp';
            timeDiv.style.marginTop = '10px';
            timeDiv.style.fontSize = '0.7rem';
            timeDiv.style.fontFamily = 'monospace';
            timeDiv.style.color = '#7b946e';
            timeSpanElement = document.createElement('span');
            timeDiv.appendChild(timeSpanElement);
            footerDiv.appendChild(timeDiv);
        }
    }
    function updateTimestamp() {
        if (!timeSpanElement) initTimestampElement();
        const now = new Date();
        if (currentLang === 'en') {
            timeSpanElement.innerText = `[ Sync Timestamp: ${now.toLocaleString('en-US', { hour12: false })} UTC+8 ]   Entity Activity: Stable / Wandering`;
        } else {
            timeSpanElement.innerText = `[ 同步时间戳：${now.toLocaleString('zh-CN', { hour12: false })} UTC+8 ]  实体活动周期: 稳定/游荡`;
        }
    }

    // 全局渲染函数
    function renderAll() {
        // 渲染 SZF 定律
        const shiData = (currentLang === 'zh') ? shiLaws.zh : shiLaws.en;
        containerShi.innerHTML = '';
        shiData.forEach(law => {
            containerShi.innerHTML += renderCard(law, 'SZF');
        });
        
        // 渲染 DXS
        const dengDataArr = (currentLang === 'zh') ? dengData.zh : dengData.en;
        containerDeng.innerHTML = '';
        dengDataArr.forEach(item => {
            containerDeng.innerHTML += renderCard(item, 'DXS');
        });
        
        // 渲染 杂项(HSB/康宝)
        const miscArr = (currentLang === 'zh') ? miscLaws.zh : miscLaws.en;
        containerOther.innerHTML = '';
        miscArr.forEach(item => {
            containerOther.innerHTML += renderCard(item, 'HSB');
        });
        
        // 更新界面文本
        const texts = (currentLang === 'zh') ? uiText.zh : uiText.en;
        document.getElementById('mainTitle').innerText = texts.mainTitle;
        document.getElementById('subGlitch').innerText = texts.subGlitch;
        document.getElementById('badge1').innerText = texts.badge1;
        document.getElementById('badge2').innerText = texts.badge2;
        document.getElementById('headerQuote').innerText = texts.headerQuote;
        document.getElementById('section1Title').innerHTML = texts.section1;
        document.getElementById('section2Title').innerHTML = texts.section2;
        document.getElementById('section3Title').innerHTML = texts.section3;
        document.getElementById('footerText1').innerHTML = texts.footer1;
        document.getElementById('footerText2').innerHTML = texts.footer2;
        const toggleBtn = document.getElementById('langToggleBtn');
        toggleBtn.innerText = (currentLang === 'zh') ? uiText.en.langBtn : uiText.zh.langBtn;
        
        // 更新时间戳以匹配语言
        updateTimestamp();
        
        // 给所有卡片动态附加过渡效果 (确保hover微动)
        attachCardEffects();
    }
    
    function attachCardEffects() {
        document.querySelectorAll('.entity-card').forEach(card => {
            card.style.transition = 'all 0.2s ease';
        });
    }
    
    // 语言切换逻辑 (修复原始代码中多层覆盖与事件重复绑定)
    const langToggleBtn = document.getElementById('langToggleBtn');
    // 移除原有click监听器防止重复，重新绑定可靠版本
    const newToggleBtn = langToggleBtn.cloneNode(true);
    langToggleBtn.parentNode.replaceChild(newToggleBtn, langToggleBtn);
    newToggleBtn.addEventListener('click', (e) => {
        e.preventDefault();
        currentLang = (currentLang === 'zh') ? 'en' : 'zh';
        renderAll();
        // 控制台彩蛋输出
        console.log(`%c⛧ [TIME.GOV] Language switched to ${currentLang.toUpperCase()} | 野史永远正确 ⛧`, "color: #8fc97f; font-size: 14px; font-family: monospace;");
    });
    
    // 初始化时间戳组件与循环更新
    initTimestampElement();
    updateTimestamp();
    setInterval(() => {
        updateTimestamp();
    }, 1000);
    
    // 初次渲染
    renderAll();
    
    // 补充额外样式修正完整性 (原始style已存在，但确保背景完美)
    const extraStyle = document.createElement('style');
    extraStyle.textContent = `
        .entity-card .law-content {
            word-break: break-word;
        }
        .sub-law {
            word-break: break-word;
        }
        button {
            background: #1f2a24;
            user-select: none;
        }
        .lang-toggle:active {
            transform: scale(0.97);
        }
    `;
    document.head.appendChild(extraStyle);
    
    // 输出启动信息
    console.log("%c⛧ [TIME.GOV] SZF定律档案加载完成 | 野史永远正确 ⛧", "color: #8fc97f; font-size: 16px; font-family: monospace;");
    console.log("营销号定律 · 现实验证: 维基收录完毕，开化鸡灵之主注视着您。");
</script>
</body>
</html>
